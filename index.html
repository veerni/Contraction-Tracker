
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Bloom - Contraction Tracker</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#c88989",
                        "background-black": "#000000",
                        "zinc-850": "#18181b",
                    },
                    fontFamily: {
                        "sans": ["Plus Jakarta Sans", "sans-serif"],
                        "display": ["Plus Jakarta Sans", "sans-serif"],
                        "quicksand": ["Quicksand", "sans-serif"]
                    },
                    animation: {
                        'pulse-slow': 'pulse-organic 6s ease-in-out infinite',
                        'pulse-fast': 'pulse-organic 3s ease-in-out infinite',
                        'float': 'float 4s ease-in-out infinite',
                        'fade-in': 'fadeIn 0.5s ease-out forwards',
                        'slide-up': 'slideUp 0.3s ease-out forwards',
                    },
                    keyframes: {
                        'pulse-organic': {
                            '0%, 100%': { transform: 'scale(1)', borderRadius: '42% 58% 70% 30% / 45% 45% 55% 55%' },
                            '50%': { transform: 'scale(1.05)', borderRadius: '55% 45% 40% 60% / 55% 55% 45% 45%' },
                        },
                        'float': {
                            '0%, 100%': { transform: 'translateY(0px)' },
                            '50%': { transform: 'translateY(-10px)' },
                        },
                        'fadeIn': {
                            '0%': { opacity: '0', transform: 'translateY(10px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        },
                        'slideUp': {
                            '0%': { transform: 'translateY(100%)' },
                            '100%': { transform: 'translateY(0)' },
                        }
                    }
                },
            },
        }
    </script>
    <style type="text/tailwindcss">
        @layer base {
            body {
                @apply bg-zinc-50 text-zinc-900 dark:bg-background-black dark:text-white antialiased overflow-hidden select-none transition-colors duration-300;
                -webkit-tap-highlight-color: transparent;
            }
        }
        .blob-shape {
            border-radius: 42% 58% 70% 30% / 45% 45% 55% 55%;
        }
        .organic-button {
            border-radius: 35% 65% 60% 40% / 45% 45% 55% 55%;
        }
        .organic-card {
            border-radius: 24px 48px 24px 48px;
        }
        .glass-dark {
            @apply bg-white/90 dark:bg-zinc-900/80 backdrop-blur-xl border-t border-zinc-200/50 dark:border-white/10;
        }
        ::-webkit-scrollbar {
            display: none;
        }
        input[type="date"]::-webkit-calendar-picker-indicator {
            @apply opacity-30 dark:invert;
        }
    </style>
<script type="importmap">
{
  "imports": {
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "@google/genai": "https://esm.sh/@google/genai@^1.40.0",
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4"
  }
}
</script>
</head>
<body>
    <div id="root"></div>
</body>
</html>
